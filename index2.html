<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ADMIN: POINT INTELLIGENCE</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #030704;
            background-image: radial-gradient(circle at 50% 50%, #081a10 0%, #020503 100%);
            color: #e2e8f0;
            margin: 0;
            padding: 40px;
        }
        #admin-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #b89030;
            border-radius: 8px;
            padding: 30px;
        }
        h1 {
            color: #d4af37;
            border-bottom: 2px solid #b89030;
            padding-bottom: 15px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border: 1px solid #543b24;
            margin-bottom: 10px;
            background: rgba(20, 15, 10, 0.5);
            border-radius: 4px;
        }
        .user-name { font-weight: bold; color: #ebd6a0; flex: 1; }
        input[type="number"] {
            background: #000;
            border: 1px solid #b89030;
            color: #fff;
            padding: 5px 10px;
            width: 120px;
            text-align: right;
        }
        button {
            background: linear-gradient(to bottom, #c49a3c, #805f1d);
            color: #000;
            border: none;
            padding: 6px 15px;
            margin-left: 10px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover { background: #d4af37; }
    </style>
</head>
<body class="bg-black text-white">

    <div id="admin-container" class="hidden p-10">
        <h1 class="text-red-600 font-black italic text-2xl uppercase">Admin Point Control</h1>
        <!-- 유저 리스트를 렌더링할 영역 -->
        <div id="user-management-list" class="mt-8"></div>
    </div>

    <script>
        // 1. 페이지 로드 시 관리자 권한 체크
        async function checkAccess() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = 'index.html';

            const { data, error } = await supabaseClient
                .from('users')
                .select('is_admin')
                .eq('login_id', loggedInUserNickname) // 사용자 식별 변수
                .single();

            if (error || !data || !data.is_admin) {
                alert("권한 없음");
                window.location.href = 'index.html';
            } else {
                document.getElementById('admin-container').classList.remove('hidden');
                loadUserList(); // 관리자라면 리스트 로드
            }
        }

        // 2. 관리자용 유저 목록 불러오기 및 렌더링
        async function loadUserList() {
            const { data: users, error } = await supabaseClient.from('users').select('*');
            const container = document.getElementById('user-management-list');
            
            if (users) {
                container.innerHTML = users.map(u => `
                    <div class="user-row">
                        <span class="user-name">${u.name}</span>
                        <div>
                            <input type="number" id="pts-${u.id}" value="${u.point}">
                            <button onclick="updateUserPoints('${u.id}')">UPDATE</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // 3. 포인트 수정 함수
        async function updateUserPoints(userId) {
            const newPoint = document.getElementById(`pts-${userId}`).value;
            const { error } = await supabaseClient
                .from('users')
                .update({ point: newPoint })
                .eq('id', userId);

            if (error) alert("오류 발생");
            else alert("포인트 수정 완료");
        }

        checkAccess();
    </script>
</body>
</html>
