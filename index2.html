<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ADMIN: POINT INTELLIGENCE</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #030704;
            background-image: radial-gradient(circle at 50% 50%, #081a10 0%, #020503 100%);
            color: #e2e8f0;
            margin: 0;
            padding: 40px;
        }
        #admin-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #b89030;
            border-radius: 8px;
            padding: 30px;
        }
        h1 {
            color: #d4af37;
            border-bottom: 2px solid #b89030;
            padding-bottom: 15px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border: 1px solid #543b24;
            margin-bottom: 10px;
            background: rgba(20, 15, 10, 0.5);
            border-radius: 4px;
        }
        .user-name { font-weight: bold; color: #ebd6a0; flex: 1; }
        input[type="number"] {
            background: #000;
            border: 1px solid #b89030;
            color: #fff;
            padding: 5px 10px;
            width: 120px;
            text-align: right;
        }
        button {
            background: linear-gradient(to bottom, #c49a3c, #805f1d);
            color: #000;
            border: none;
            padding: 6px 15px;
            margin-left: 10px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover { background: #d4af37; }
    </style>
</head>
<body class="bg-black text-white">

    <div id="admin-container" class="hidden p-10">
        <h1 class="text-red-600 font-black italic text-2xl uppercase">Admin Point Control</h1>
        <!-- 유저 리스트를 렌더링할 영역 -->
        <div id="user-management-list" class="mt-8"></div>
    </div>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://zoasgzpjlmuegrvxlwgy.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_sn8jOIw-F2FnSez4vPWjaA_gNvkARpq"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const loggedInUserNickname = localStorage.getItem('arcade_fake_session_user');

        async function checkAccess() {
            // 1. Supabase에서 현재 세션 가져오기
            const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
            
            // 2. localStorage에서 닉네임 가져오기
            const nickname = localStorage.getItem('arcade_fake_session_user');
        
            // 3. 인증 정보나 닉네임이 없으면 즉시 이동
            if (!session || !nickname) {
                console.log("세션 혹은 닉네임 정보 없음");
                return window.location.href = 'index.html';
            }
        
            // 4. DB에서 관리자 권한 확인
            const { data, error } = await supabaseClient
                .from('users')
                .select('is_admin')
                .eq('login_id', nickname)
                .single();
        
            // 디버깅을 위한 로그 추가 (콘솔창에서 확인 가능)
            console.log("조회된 데이터:", data, "에러:", error);
        
            if (error || !data || data.is_admin !== true) {
                alert("관리자 권한이 없습니다.");
                window.location.href = 'index.html';
            } else {
                // 성공 시 화면 표시
                document.getElementById('admin-container').classList.remove('hidden');
                loadUserList();
            }
                // 2. 관리자용 유저 목록 불러오기 및 렌더링
        async function loadUserList() {
            const { data: users, error } = await supabaseClient
                .from('users')
                .select('id, name, point'); 
            
            const container = document.getElementById('user-management-list');
            
            if (error) {
                console.error("데이터 로드 오류:", error);
                return;
            }
            
            if (users) {
                container.innerHTML = users.map(u => `
                    <div class="user-row">
                        <!-- 이름과 포인트를 나란히 배치합니다 -->
                        <span class="user-name">${u.name}</span>
                        <div>
                            <input type="number" id="pts-${u.id}" value="${u.point}">
                            <button onclick="updateUserPoints('${u.id}')">UPDATE</button>
                        </div>
                    </div>
                `).join('');
            }
        }
        // 3. 포인트 수정 함수
        async function updateUserPoints(userId) {
            const newPoint = document.getElementById(`pts-${userId}`).value;
            const { error } = await supabaseClient
                .from('users')
                .update({ point: newPoint })
                .eq('id', userId);

            if (error) alert("오류 발생");
            else alert("포인트 수정 완료");
        }

        checkAccess();
    </script>
</body>
</html>
