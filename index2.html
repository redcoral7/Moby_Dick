<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ADMIN: POINT INTELLIGENCE</title>
    <!-- 기존 CSS 스타일을 여기에 유지하세요 -->
</head>
<body class="bg-black text-white">

    <div id="admin-container" class="hidden p-10">
        <h1 class="text-red-600 font-black italic text-2xl uppercase">Admin Point Control</h1>
        <!-- 유저 리스트를 렌더링할 영역 -->
        <div id="user-management-list" class="mt-8"></div>
    </div>

    <script>
        // 1. 페이지 로드 시 관리자 권한 체크
        async function checkAccess() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = 'index.html';

            const { data, error } = await supabaseClient
                .from('users')
                .select('is_admin')
                .eq('login_id', loggedInUserNickname) // 사용자 식별 변수
                .single();

            if (error || !data || !data.is_admin) {
                alert("권한 없음");
                window.location.href = 'index.html';
            } else {
                document.getElementById('admin-container').classList.remove('hidden');
                loadUserList(); // 관리자라면 리스트 로드
            }
        }

        // 2. 관리자용 유저 목록 불러오기 및 렌더링
        async function loadUserList() {
            const { data: users, error } = await supabaseClient.from('users').select('*');
            const container = document.getElementById('user-management-list');
            
            if (users) {
                container.innerHTML = users.map(u => `
                    <div class="flex gap-4 p-4 border border-zinc-800 mb-2">
                        <span>${u.name}</span>
                        <input type="number" id="pts-${u.id}" value="${u.point}" class="bg-black border p-1 text-right">
                        <button onclick="updateUserPoints('${u.id}')" class="bg-red-900 px-4">UPDATE</button>
                    </div>
                `).join('');
            }
        }

        // 3. 포인트 수정 함수
        async function updateUserPoints(userId) {
            const newPoint = document.getElementById(`pts-${userId}`).value;
            const { error } = await supabaseClient
                .from('users')
                .update({ point: newPoint })
                .eq('id', userId);

            if (error) alert("오류 발생");
            else alert("포인트 수정 완료");
        }

        checkAccess();
    </script>
</body>
</html>
