<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>VIP 로얄 카지노</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="login-overlay" id="loginPanel">
        <div class="login-box">
            <h2>LOGIN</h2>
            <input type="text" id="uid" placeholder="ID">
            <input type="password" id="upw" placeholder="PASSWORD">
            <button id="loginBtn">로그인</button>
        </div>
    </div>

    <header><h1>VIP 로얄 카지노 관제 시스템</h1></header>

    <script type="module">
        import { login } from './authLogic.js';
        import { calculateWin, syncPoint } from './gameLogic.js';

        // 1. 초기 로그인 이벤트 연결
        document.getElementById('loginBtn').onclick = async () => {
            const success = await login(supabase, 'id', 'pw');
            if(success) document.getElementById('loginPanel').style.display = 'none';
        };

        // 2. 게임 실행 및 기타 로직 통합
    </script>
</body>
</html>
