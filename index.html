<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>VIP 로얄 카지노</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-overlay" id="loginPanel">
        <div class="login-box">
            <h2>LOGIN</h2>
            <input type="text" id="uid" placeholder="ID">
            <input type="password" id="upw" placeholder="PASSWORD">
            <button id="loginBtn">로그인</button>
        </div>
    </div>

    <header id="arcade-header" class="hidden">
        <h1>VIP 로얄 카지노 관제 시스템</h1>
    </header>
    
    <div id="arcade-viewport" class="arcade-grid hidden">
        </div>

    <script type="module">
        import * as Auth from './authLogic.js';
        import * as Game from './gameLogic.js';
    // 1. Supabase 초기화 (이미지에 있는 값을 그대로 복사해서 넣으세요)
        const supabaseUrl = 'https://zoasgzpjlmuegrvxlwgy.supabase.co';
        const supabaseKey = 'sb_publishable_sn8jOIw-F2FnSez4vPWjaA_gNvkARpq';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        // 2. 게임 로직에 supabaseClient 전달
        Game.setSupabase(supabaseClient);
        Auth.setSupabase(supabaseClient);

        document.getElementById('loginBtn').onclick = async () => {
                const id = document.getElementById('uid').value;
                const pw = document.getElementById('upw').value;
                
                try {
                    const user = await Auth.loginUser(id, pw);
                    if(user) {
                        // 1. 로그인 패널 숨기기
                        document.getElementById('loginPanel').style.display = 'none';
                        
                        // 2. 게임 화면을 담을 컨테이너가 화면에 나타나게 설정
                        const viewport = document.getElementById('arcade-viewport');
                        viewport.classList.remove('hidden'); // hidden 클래스 제거
                        
                        // 3. 게임 로직 실행 (테이블 생성 등)
                        Game.initializeArcadeGrid(1); 
                    }
                } catch(e) {
                    alert('로그인 실패: ' + e.message);
                }
            };
                
window.initializeArcadeGrid = () => Game.initializeArcadeGrid(1);
    
    // 로그아웃 로직 추가
    window.handleSignOut = () => {
        localStorage.removeItem('arcade_fake_session_user');
        location.reload();
    };

    // 5. 페이지 로드 시 상태 확인
    window.onload = async () => {
        const savedUser = localStorage.getItem('currentUser'); // authLogic.js에서 저장한 key값 사용
        const btn = document.getElementById('open-station-btn');
        const msg = document.getElementById('setup-status-msg');
        
        if (savedUser && btn && msg) {
            btn.disabled = false;
            msg.innerText = "✅ 로그인이 확인되었습니다. 관제 시스템을 개장하십시오.";
            msg.style.color = "#34d399";
        }
    };
    // 기타 게임 로직 노출
        window.setupGame = Game.setupGame;
        window.resetSlot = Game.resetSlot;
        window.bjStart = Game.bjStart;
        window.bjHit = Game.bjHit;
        window.bjStand = Game.bjStand;
        window.oeSelect = Game.oeSelect;
        window.oeRoll = Game.oeRoll;
        window.roTypeChange = Game.roTypeChange;
        window.roSpin = Game.roSpin;
    </script>
</body>
</html>
